<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
        // GitHub Pages redirect for client-side routing
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        
        // Remove the repo name from the path
        var repoName = '/gridpoint-capital';
        if (path.startsWith(repoName)) {
            path = path.slice(repoName.length);
        }
        
        // If no path, set to root
        if (!path) {
            path = '/';
        }
        
        // Redirect to index.html with the original path
        window.location.replace(repoName + '/?redirect=' + encodeURIComponent(path + search + hash));
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
